<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Test Game - Portal Demo</title>
  <style>
    body { margin: 0; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: monospace; font-size: 14px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">WASD to move | Walk into the portal to enter</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { createVibePortal } from 'https://portals-production-ee2d.up.railway.app/embed.js';

    // Basic scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Lights
    scene.add(new THREE.AmbientLight(0x404060, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 5);
    sun.castShadow = true;
    scene.add(sun);

    // Player cube
    const player = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 1.2, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x112244 })
    );
    player.position.y = 0.6;
    player.castShadow = true;
    scene.add(player);

    // Add the portal — this is the entire integration
    const portal = createVibePortal({ scene, camera });
    portal.position.set(0, 0, -8);
    scene.add(portal);

    // Camera follows player
    camera.position.set(0, 6, 10);

    // Movement
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      const speed = 0.1;
      if (keys['KeyW']) player.position.z -= speed;
      if (keys['KeyS']) player.position.z += speed;
      if (keys['KeyA']) player.position.x -= speed;
      if (keys['KeyD']) player.position.x += speed;

      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 10;
      camera.lookAt(player.position);

      portal.update(player.position);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
